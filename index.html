<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>For My Favorite Human 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Comic Sans MS', cursive;
  text-align: center;
  background: linear-gradient(135deg, #ffd6ec, #e0c3fc, #c3f0ff);
  touch-action: manipulation;
}

.hidden { display: none; }

button {
  padding: 14px 18px;
  font-size: 14px;
}

#noBtn { position: absolute; }

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  max-width: 350px;
  margin: auto;
  gap: 10px;
}

.card {
  width: 100%;
  aspect-ratio: 1/1;
  font-size: 24px;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

#game3 {
  position: relative;
  height: 60vh;
  max-height: 400px;
  background: #fff;
  overflow: hidden;
  touch-action: none; /* FIX */
}

#player {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 35px;
}

.falling {
  position: absolute;
  top: 0;
  font-size: 30px;
}

#letter::after {
  content: "|";
  animation: blink 1s infinite;
}

#letter {
  padding: 10px;
  font-size: 14px;
}

#final {
  background: linear-gradient(180deg, #0f0c29, #302b63, #24243e);
  color: white;
  height: 100vh;
  overflow-y: auto;
  padding: 20px;
  animation: fadeIn 2s ease;
}

@keyframes blink {
  50% {opacity: 0;}
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

#giftBox {
  transition: transform 0.5s;
}

#giftBox:hover {
  transform: scale(1.2) rotate(10deg);
}

#cake {
  animation: popUp 1s ease;
}

@keyframes popUp {
  from {transform: scale(0);}
  to {transform: scale(1);}
}
</style>
</head>

<body>

<div id="loading">
  <h2 id="loadingText">Loading...</h2>
</div>

<div id="question" class="hidden">
  <h2>Apakah cinta ingin bermain bersamaku? 💖</h2>
  <button onclick="startGame1()">YES</button>
  <button id="noBtn">NO</button>
</div>

<div id="game1" class="hidden">
  <h2>Meme Memory Match 🧠</h2>
  <div class="grid" id="grid"></div>
</div>

<div id="game2" class="hidden">
  <h2 id="qText"></h2>
  <button onclick="nextQ()">YES</button>
  <button id="noBtn2">NO</button>
</div>

<div id="game3" class="hidden">
  <h2>Catch Love 💕 (Score: <span id="score">0</span>)</h2>
  <div id="player">🚗</div>
</div>

<div id="giftScene" class="hidden">
  <h2>🎁 Kamu mendapatkan hadiah dari orang spesial 💖</h2>
  <div id="giftBox" style="font-size:80px; cursor:pointer;">🎁</div>
  <div id="cake" class="hidden" style="font-size:80px; margin-top:20px;">🎂✨ 20</div>
  <br>
  <button id="openLetterBtn" class="hidden" onclick="showFinal()">
    Buka Hadiah 💌
  </button>
</div>

<audio id="g1_music" loop src="game1.mp3"></audio>
<audio id="match_sound" src="correct.mp3"></audio>
<audio id="wrong_sound" src="wrong.mp3"></audio>
<audio id="g2_music" loop src="game2.mp3"></audio>
<audio id="g3_music" loop src="game3.mp3"></audio>

<script>

function stopAllMusic(){
  document.querySelectorAll("audio").forEach(a=>{
    a.pause();
    a.currentTime = 0;
  });
}

function playMusic(id, volume=0.5){
  let a = document.getElementById(id);
  if(a){
    a.volume = volume;
    a.play().catch(()=>{});
  }
}

// LOADING
let percent = 1;
let loadInterval = setInterval(()=>{
  document.getElementById("loadingText").innerText =
    "Mempersiapkan hal yang lebih penting dari skripsi... ("+percent+"%)";
  percent++;
  if(percent>100){
    clearInterval(loadInterval);
    loading.classList.add("hidden");
    question.classList.remove("hidden");
  }
},40);

// NO BUTTON
noBtn.onmouseover = ()=>{
  noBtn.style.left = Math.random()*80+"%";
  noBtn.style.top = Math.random()*80+"%";
};

// GAME 1
let emojis = ["🐱","🐱","😺","😺","😹","😹","🐶","🐶","🌸","🌸","💖","💖"];
let shuffled = emojis.sort(()=>0.5-Math.random());
let first=null, second=null, match=0;

function startGame1(){
  stopAllMusic();
  playMusic("g1_music", 0.4);

  question.classList.add("hidden");
  game1.classList.remove("hidden");

  let grid = document.getElementById("grid");
  shuffled.forEach(e=>{
    let div = document.createElement("div");
    div.className="card";
    div.dataset.value=e;
    div.onclick=()=>{
      div.innerText=e;
      if(!first){ first=div; }
      else{
        second=div;
        if(first.dataset.value===second.dataset.value){
          playMusic("match_sound",1);
          match++;
          first=null; second=null;
          if(match===6){
            game1.classList.add("hidden");
            startGame2();
          }
        }else{
          playMusic("wrong_sound",1);
          setTimeout(()=>{
            first.innerText="";
            second.innerText="";
            first=null; second=null;
          },500);
        }
      }
    };
    grid.appendChild(div);
  });
}

// GAME 2
let questions = ["Apa aku orang terfavoritmu?","Mau dapet hadiahnya sekarang?","Kamu sayang banget banget kan sama aku?"];
let qi=0;

function startGame2(){
  stopAllMusic();
  playMusic("g2_music", 1);
  game2.classList.remove("hidden");
  qText.innerText=questions[qi];
}

function nextQ(){
  qi++;
  if(qi<questions.length){
    qText.innerText=questions[qi];
  }else{
    game2.classList.add("hidden");
    startGame3();
  }
}

noBtn2.onmouseover = ()=>{
  noBtn2.style.position="absolute";
  noBtn2.style.left=Math.random()*80+"%";
  noBtn2.style.top=Math.random()*80+"%";
};

// GAME 3 FIX
let score=0;
let player=document.getElementById("player");
let gameArea=document.getElementById("game3");

function movePlayer(clientX){
  let rect = gameArea.getBoundingClientRect();
  let x = clientX - rect.left;

  let max = gameArea.offsetWidth - player.offsetWidth;
  let newLeft = x - (player.offsetWidth/2);

  if(newLeft<0) newLeft=0;
  if(newLeft>max) newLeft=max;

  player.style.left=newLeft+"px";
}

gameArea.addEventListener("touchmove",(e)=>{
  e.preventDefault();
  movePlayer(e.touches[0].clientX);
},{passive:false});

gameArea.addEventListener("click",(e)=>{
  movePlayer(e.clientX);
});

function startGame3(){
  stopAllMusic();
  playMusic("g3_music",0.4);
  game3.classList.remove("hidden");
  spawn();
}

function spawn(){
  let item=document.createElement("div");
  item.className="falling";
  let types=["🍫","💖","🌸","💣"];
  let t=types[Math.floor(Math.random()*types.length)];
  item.innerText=t;
  item.style.left=Math.random()*90+"%";
  game3.appendChild(item);

  let fall=setInterval(()=>{
    item.style.top=(item.offsetTop+5)+"px";

    if(item.offsetTop > gameArea.offsetHeight - 50){
      if(Math.abs(item.offsetLeft-player.offsetLeft)<50){
        score += (t==="💣" ? -1 : 1);
        scoreText.innerText=score;
      }
      item.remove();
      clearInterval(fall);
    }

    if(score>=10){
      game3.classList.add("hidden");
      showGift();
    }
  },50);

  setTimeout(spawn,800);
}

// GIFT
function showGift(){
  stopAllMusic();
  giftScene.classList.remove("hidden");
}

function showFinal(){
  stopAllMusic();
  document.body.innerHTML="<h1 style='color:white;background:black;height:100vh;'>💌 Surat tampil di sini</h1>";
}
</script>
</body>
</html>
